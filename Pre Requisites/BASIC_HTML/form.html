<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Registeration Form...   </h1>
    <form action="">
        <fieldset>
            <legend>Personal Details</legend>

            <label for="name">Name</label><br>
            <input id="name" type="text" placeholder="Enter Your Name"><br><br>

            <label for="email">Email</label><br>
            <input id="email" type="text" placeholder="Enter Your Email"><br><br>

            <label for="mobile">Mobile</label><br>
            <input id="mobile" type="text" placeholder="Enter Your Mobile"><br>
        </fieldset> <br>
        <label for="courses">Select Courses</label>
        <select name="" id="courses">
            <optgroup label="Frontend">
                <option value="">HTML</option>
                <option value="">CSS</option>
                <option value="">JS</option>
            </optgroup>
            <optgroup label="Backend">
                <option value="">Node.js</option>
                <option value="">Express.js</option>
                <option value="">MySql</option>
            </optgroup>
        </select> <br> <br>
        <button>Submit Form</button>
    </form>
</body>
</html>
