<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Assignment2.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

</head>
<body>
    <div class="container">

        <!--LEFT PANEL-->
        <div class="left-panel">

            <div class="top-left">

                <h1 class="logo">INSECT</h1>

                <div class="search-box">
                    <span>⌕</span>
                    <input type="text" placeholder="Search..">
                </div>
            </div>

             <!--Classification-->

        <div class="classification-wrapper">
            <h2 class="vertical-text">Classification</h2>

            <div class="classification-list">
                <div class="item">
                    <h4>Class:</h4>
                    <p>Insects</p>
                </div>
                <div class="item">
                    <h4>Order:</h4>
                    <p>Coleoptera</p>
                </div>
                <div class="item">
                    <h4>Family:</h4>
                    <p>Cerambyciane</p>
                </div>
                <div class="item">
                    <h4>Sub-Family:</h4>
                    <p>Cerambyciane</p>
                </div>
                <div class="item">
                    <h4>Tribe:</h4>
                    <p>Callicromatini</p>
                </div>
                <div class="item">
                    <h4>Genus:</h4>
                    <p>Pachyteria</p>
                </div>
            </div>
        </div> 

        </div>

       


        <!--RIGHT PANEL-->
        <div class="right-panel">
            <nav>
                <a href="">Home</a>
                <a href="">Shop</a>
                <a href="">About</a>
                <a href="">Gallery</a>
                <a href="">Contact</a>
            </nav>

            <div class="content">
                <h1>Pachyteria
                    <br>
                    equestris
                </h1>
                
                <div class="details">
                    <div class="detail-box">
                        <h3>Sex:</h3>
                        <p>Male</p>
                    </div>
                    <div class="detail-box">
                        <h3>Size:</h3>
                        <p>32 mm / 12 mm</p>
                    </div>

                </div>
                <h2 class="price">$5.99</h2>
                <div class="options">
                    <div class="option">
                        <div class="toggle"></div>
                        <p>View detailed antennae</p>
                    </div>
                    <div class="option">
                        <div class="toggle"></div>
                        <p>View underside</p>
                      </div>
                </div>
                <button>
                    Add to collection
                  </button>
            </div>
        </div>

         <!-- CENTER SHOWCASE -->

<div class="center-showcase">

    <div class="glass-dome"></div>

    <img
        class="insect-image"
        src="insect1.png"
        alt="Image Not Found"
    >

</div>

        
    </div>
